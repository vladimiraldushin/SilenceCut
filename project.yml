name: SilenceCut
options:
  bundleIdPrefix: ru.aldushin
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SilenceCut:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.aldushin.SilenceCut
        PRODUCT_NAME: SilenceCut
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: SilenceCut
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.video"

  SilenceCutTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: SilenceCut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.aldushin.SilenceCutTests
