name: SilenceCut
options:
  bundleIdPrefix: ru.aldushin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""

targets:
  SilenceCut:
    type: application
    platform: macOS
    sources:
      - path: SilenceCut
        excludes:
          - Resources/placeholder.txt
    resources:
      - path: SilenceCut/Resources
        excludes:
          - placeholder.txt
    info:
      path: SilenceCut/Resources/Info.plist
      properties:
        CFBundleIdentifier: ru.aldushin.SilenceCut
        CFBundleName: SilenceCut
        CFBundleDisplayName: SilenceCut
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright © 2026 Vladimir Aldushin."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.aldushin.SilenceCut
        PRODUCT_NAME: SilenceCut
        INFOPLIST_FILE: SilenceCut/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: true
        ENABLE_HARDENED_RUNTIME: false
      debug:
        ENABLE_HARDENED_RUNTIME: false
      release:
        ENABLE_HARDENED_RUNTIME: false
    entitlements:
      path: SilenceCut/SilenceCut.entitlements
      properties:
        com.apple.security.app-sandbox: false

  SilenceCutTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SilenceCutTests
    dependencies:
      - target: SilenceCut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.aldushin.SilenceCutTests
